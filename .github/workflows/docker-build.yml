name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Force full rebuild (no Docker layer cache)"
        type: boolean
        default: false

env:
  IMAGE: ghcr.io/rapido-tech/mascaradi

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: ${{ github.event.inputs.no_cache == 'true' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Fires AFTER the image is pushed — Dokploy always pulls the new digest.
      # Uses API key auth (more reliable than webhook URL, which changes
      # whenever the compose service is recreated in Dokploy).
      - name: Trigger Dokploy deploy
        continue-on-error: true
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          if [ -z "$DOKPLOY_API_KEY" ] || [ -z "$DOKPLOY_COMPOSE_ID" ] || [ -z "$DOKPLOY_URL" ]; then
            echo "::warning::DOKPLOY_URL, DOKPLOY_API_KEY or DOKPLOY_COMPOSE_ID not set — deploy not triggered"
            exit 0
          fi
          code=$(curl -skL -X POST \
            -H "Content-Type: application/json" \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -d "{\"composeId\": \"$DOKPLOY_COMPOSE_ID\"}" \
            -o /dev/null -w "%{http_code}" --max-time 30 \
            "$DOKPLOY_URL/api/compose.redeploy" || echo "000")
          echo "Redeploy response: HTTP $code"
          if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
            echo "Deploy triggered successfully"
          else
            echo "::warning::Redeploy returned $code — check DOKPLOY_URL, DOKPLOY_API_KEY, DOKPLOY_COMPOSE_ID"
          fi
